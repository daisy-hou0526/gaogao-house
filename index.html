<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 糕糕的云端小屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #fdf2f8; background-image: radial-gradient(at 0% 0%, #fce7f3 0px, transparent 50%), radial-gradient(at 100% 0%, #fef08a 0px, transparent 50%), radial-gradient(at 100% 100%, #e9d5ff 0px, transparent 50%); background-attachment: fixed; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        
        /* 极致玻璃质感 */
        .glass-panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 8px 32px 0 rgba(236, 72, 153, 0.05); }
        .glass-header { font-family: 'Ma Shan Zheng', cursive; letter-spacing: 2px; }
        
        /* 切换动画 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tab-active { background: linear-gradient(135deg, #fbcfe8 0%, #fce7f3 100%); border-color: #f9a8d4; color: #db2777; font-weight: bold; box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2); }
        .tab-inactive { background: rgba(255, 255, 255, 0.3); color: #9ca3af; }
        .hide { display: none; }

        /* 闪卡翻转动画 */
        .flip-card { perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 1rem; }
        .flip-card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-700">

    <div class="max-w-6xl mx-auto mb-8 glass-panel rounded-3xl p-6 md:p-8 relative overflow-hidden">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 relative z-10">
            <div>
                <h1 class="text-5xl text-pink-500 glass-header drop-shadow-md mb-3">✨ 糕糕的云端小屋</h1>
                <div class="flex items-center gap-3">
                    <div class="bg-white/60 px-4 py-2 rounded-xl border border-pink-100 shadow-sm">
                        <span id="current-time" class="text-2xl font-bold text-pink-600 tracking-wider">00:00:00</span>
                    </div>
                    <div class="text-sm font-medium text-gray-500" id="current-date">加载日期中...</div>
                </div>
            </div>
            <div class="w-full md:w-1/2 flex flex-col gap-4">
                <div>
                    <div class="flex justify-between text-xs font-bold text-gray-500 mb-1">
                        <span>🌍 2026年终极进度</span><span id="year-percent">...</span>
                    </div>
                    <div class="h-3 w-full bg-white/50 rounded-full overflow-hidden border border-white/60">
                        <div id="year-bar" class="h-full bg-gradient-to-r from-pink-300 to-yellow-300 transition-all duration-1000 w-0"></div>
                    </div>
                </div>
                <div>
                    <div class="text-xs font-bold text-gray-500 mb-1">📅 本月自由网格 (用掉的时光 vs 剩余的空白)</div>
                    <div id="month-grid" class="flex flex-wrap gap-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto mb-6 flex flex-wrap gap-4">
        <button id="btn-thesis" onclick="switchTab('thesis')" class="tab-inactive glass-panel px-6 py-3 rounded-2xl transition-all">🎓 论文监管局</button>
        <button id="btn-life" onclick="switchTab('life')" class="tab-inactive glass-panel px-6 py-3 rounded-2xl transition-all">🌷 碎片日常</button>
        <button id="btn-spanish" onclick="switchTab('spanish')" class="tab-active glass-panel px-6 py-3 rounded-2xl transition-all">🇪🇸 西语启蒙站</button>
    </div>

    <div id="thesis-board" class="max-w-6xl mx-auto hide flex gap-6 overflow-x-auto pb-8 items-start fade-in">
        <div class="min-w-[320px] glass-panel rounded-3xl p-5 border-t-4 border-red-400">
            <h2 class="text-lg font-bold text-gray-700 mb-4">二次查重提交 <span class="text-xs bg-red-500 text-white px-2 py-1 rounded-md">4月13日</span></h2>
            <div class="bg-red-50/80 border border-red-100 rounded-2xl p-4 mb-3"><div class="text-2xl font-black text-red-500" id="countdown-13">计算中...</div></div>
        </div>
        <div class="min-w-[320px] glass-panel rounded-3xl p-5 border-t-4 border-yellow-400">
            <h2 class="text-lg font-bold text-gray-700 mb-4">答辩与归档 <span class="text-xs bg-yellow-400 text-white px-2 py-1 rounded-md">4月29日起</span></h2>
            <div class="bg-yellow-50/80 border border-yellow-100 rounded-2xl p-4 mb-3"><div class="text-xl font-bold text-yellow-600" id="countdown-29">计算中...</div></div>
        </div>
    </div>

    <div id="life-board" class="max-w-6xl mx-auto hide flex flex-col md:flex-row gap-6 fade-in">
        <div class="flex-1 glass-panel rounded-3xl p-6 border-t-4 border-purple-400">
            <h2 class="text-xl font-bold text-purple-500 mb-4">🔮 未来一周预览</h2>
            <div id="seven-days" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <div id="spanish-board" class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6 fade-in">
        
        <div class="flex-1 glass-panel rounded-3xl p-6 border-t-4 border-yellow-400">
            <h2 class="text-xl font-bold text-yellow-600 mb-4 flex items-center gap-2">🃏 今日西语闪卡 (点击翻转)</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="flip-card h-32" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="flip-card-front bg-white/60 border border-yellow-200">
                            <span class="text-3xl font-black text-gray-800">Hola</span>
                        </div>
                        <div class="flip-card-back bg-yellow-100 border border-yellow-300">
                            <span class="text-2xl font-bold text-yellow-700">你好</span>
                            <span class="text-sm text-yellow-600 mt-1">发音: 欧拉 (H不发音)</span>
                        </div>
                    </div>
                </div>
                <div class="flip-card h-32" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="flip-card-front bg-white/60 border border-yellow-200">
                            <span class="text-3xl font-black text-gray-800">Gracias</span>
                        </div>
                        <div class="flip-card-back bg-yellow-100 border border-yellow-300">
                            <span class="text-2xl font-bold text-yellow-700">谢谢</span>
                            <span class="text-sm text-yellow-600 mt-1">发音: 格拉西亚斯</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-6">
            <div class="glass-panel rounded-3xl p-6 border-t-4 border-pink-400">
                <h2 class="text-xl font-bold text-pink-500 mb-4">🗣️ 西语灵魂：五个元音</h2>
                <div class="flex justify-between">
                    <div class="w-12 h-12 rounded-full bg-white/60 flex items-center justify-center font-black text-xl text-pink-600 hover:bg-pink-200 transition cursor-pointer" title="发音: 啊">A</div>
                    <div class="w-12 h-12 rounded-full bg-white/60 flex items-center justify-center font-black text-xl text-pink-600 hover:bg-pink-200 transition cursor-pointer" title="发音: 诶">E</div>
                    <div class="w-12 h-12 rounded-full bg-white/60 flex items-center justify-center font-black text-xl text-pink-600 hover:bg-pink-200 transition cursor-pointer" title="发音: 伊">I</div>
                    <div class="w-12 h-12 rounded-full bg-white/60 flex items-center justify-center font-black text-xl text-pink-600 hover:bg-pink-200 transition cursor-pointer" title="发音: 哦">O</div>
                    <div class="w-12 h-12 rounded-full bg-white/60 flex items-center justify-center font-black text-xl text-pink-600 hover:bg-pink-200 transition cursor-pointer" title="发音: 乌">U</div>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-6 border-t-4 border-purple-400 relative overflow-hidden">
                <h2 class="text-xl font-bold text-purple-500 mb-2">🏆 大小姐的今日进度</h2>
                <p class="text-sm text-gray-500 mb-4">一天只背5个词，坚持就是胜利。</p>
                <label class="flex items-center gap-3 p-3 bg-white/50 rounded-xl cursor-pointer hover:bg-purple-50 transition">
                    <input type="checkbox" class="w-6 h-6 accent-purple-500 rounded" onchange="if(this.checked) alert('乖宝宝，今天任务完成！奖励自己去吃点好吃的吧！')">
                    <span class="font-bold text-gray-700">我今天已经翻过闪卡啦！</span>
                </label>
            </div>
        </div>

    </div>

    <script>
        // ... (保持上一版的时钟和日历逻辑，节省篇幅) ...
        function switchTab(tabId) {
            const tabs = ['thesis', 'life', 'spanish'];
            tabs.forEach(id => {
                const board = document.getElementById(id + '-board');
                const btn = document.getElementById('btn-' + id);
                if (id === tabId) {
                    board.classList.remove('hide');
                    btn.className = 'tab-active glass-panel px-6 py-3 rounded-2xl transition-all';
                } else {
                    board.classList.add('hide');
                    btn.className = 'tab-inactive glass-panel px-6 py-3 rounded-2xl transition-all';
                }
            });
        }
    </script>
</body>
</html>
